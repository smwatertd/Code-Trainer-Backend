version: 1
target_language: python

actions:
  - recognize
  - assemble
  - translate
  - analyze
  - debug
  - implement

patterns:
  - id: tr_pattern_translation
    action: implement
    source: { kind: text }
    target: { kind: code, language: python }
    grading: tests
    legacy_adapter: task_translate_full_program
    description_ru: "Написать Python по условию с проверкой конструкций."

  - id: tr_python_snippet
    action: translate
    source: { kind: code, language: python }
    target: { kind: code, language: python }
    grading: pattern_only
    description_ru: "Фрагмент кода с ожидаемой конструкцией."

  - id: rec_python_snippet_to_text
    action: recognize
    source: { kind: code, language: python }
    target: { kind: text }
    grading: quiz
    description_ru: "По фрагменту Python-кода назвать конструкцию."

  - id: ana_python_predict_output
    action: analyze
    source: { kind: code, language: python }
    target: { kind: text }
    grading: quiz
    description_ru: "Предсказать вывод программы на Python."

  - id: dbg_python_logic_fix
    action: debug
    source: { kind: code, language: python }
    target: { kind: code, language: python }
    grading: tests
    description_ru: "Исправить логическую ошибку в Python-коде."
