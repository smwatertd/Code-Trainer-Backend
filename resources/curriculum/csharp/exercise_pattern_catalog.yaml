version: 1
target_language: csharp

actions:
  - recognize
  - assemble
  - translate
  - analyze
  - debug
  - implement

patterns:
  - id: tr_pattern_translation
    action: implement
    source: { kind: text }
    target: { kind: code, language: csharp }
    grading: tests
    legacy_adapter: task_translate_full_program
    description_ru: "Написать C# по условию с проверкой конструкций."

  - id: tr_csharp_snippet
    action: translate
    source: { kind: code, language: csharp }
    target: { kind: code, language: csharp }
    grading: pattern_only
    description_ru: "Фрагмент кода с ожидаемой конструкцией."

  - id: rec_csharp_snippet_to_text
    action: recognize
    source: { kind: code, language: csharp }
    target: { kind: text }
    grading: quiz
    description_ru: "По фрагменту C#-кода назвать конструкцию."

  - id: ana_csharp_predict_output
    action: analyze
    source: { kind: code, language: csharp }
    target: { kind: text }
    grading: quiz
    description_ru: "Предсказать вывод программы на C#."

  - id: dbg_csharp_logic_fix
    action: debug
    source: { kind: code, language: csharp }
    target: { kind: code, language: csharp }
    grading: tests
    description_ru: "Исправить логическую ошибку в C#-коде."
