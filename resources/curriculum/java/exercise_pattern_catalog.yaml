version: 1
target_language: java

actions:
  - recognize
  - assemble
  - translate
  - analyze
  - debug
  - implement

patterns:
  - id: tr_pattern_translation
    action: implement
    source: { kind: text }
    target: { kind: code, language: java }
    grading: tests
    legacy_adapter: task_translate_full_program
    description_ru: "Написать Java по условию с проверкой конструкций."

  - id: tr_java_snippet
    action: translate
    source: { kind: code, language: java }
    target: { kind: code, language: java }
    grading: pattern_only
    description_ru: "Фрагмент кода с ожидаемой конструкцией."

  - id: rec_java_snippet_to_text
    action: recognize
    source: { kind: code, language: java }
    target: { kind: text }
    grading: quiz
    description_ru: "По фрагменту Java-кода назвать конструкцию."

  - id: ana_java_predict_output
    action: analyze
    source: { kind: code, language: java }
    target: { kind: text }
    grading: quiz
    description_ru: "Предсказать вывод программы на Java."

  - id: dbg_java_logic_fix
    action: debug
    source: { kind: code, language: java }
    target: { kind: code, language: java }
    grading: tests
    description_ru: "Исправить логическую ошибку в Java-коде."
