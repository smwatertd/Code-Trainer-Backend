id: csharp
label: C#
file_extension: .cs
monaco_language: csharp
features:
  - lint
  - compile
  - test
patterns:
  normalization_key: csharp

local:
  lint:
    command:
      - bash
      - -lc
      - >-
        workdir="$(dirname "{filename}")" && rm -rf "$workdir/app" &&
        cp -a /runner/template/. "$workdir/app/" &&
        cp "{filename}" "$workdir/app/Program.cs" && cd "$workdir/app" &&
        DOTNET_NOLOGO=1 dotnet build --no-restore -v q 2>&1 | grep -Ei 'error|warning' || true
  compile:
    command:
      - bash
      - -lc
      - >-
        workdir="$(dirname "{filename}")" && rm -rf "$workdir/app" &&
        cp -a /runner/template/. "$workdir/app/" &&
        cp "{filename}" "$workdir/app/Program.cs" && cd "$workdir/app" &&
        DOTNET_NOLOGO=1 dotnet build --no-restore -v q 2>&1

docker:
  image: csharp_runner
  lint: >-
    ws="$(dirname {source})" && rm -rf "$ws/app" && cp -a /runner/template/. "$ws/app/" &&
    cp {source} "$ws/app/Program.cs" && cd "$ws/app" &&
    DOTNET_NOLOGO=1 dotnet build --no-restore -v q 2>&1 | grep -Ei 'error|warning' || true
  compile: >-
    ws="$(dirname {source})" && rm -rf "$ws/app" && cp -a /runner/template/. "$ws/app/" &&
    cp {source} "$ws/app/Program.cs" && cd "$ws/app" &&
    DOTNET_NOLOGO=1 dotnet build --no-restore -v q 2>&1
  run: >-
    ws="$(dirname {source})" && rm -rf "$ws/app" && cp -a /runner/template/. "$ws/app/" &&
    cp {source} "$ws/app/Program.cs" && cd "$ws/app" &&
    DOTNET_NOLOGO=1 dotnet build --no-restore -v q >/dev/null 2>&1 &&
    DOTNET_NOLOGO=1 dotnet run --no-build -v q --no-launch-profile

test:
  strategy: compile_and_run
  batch_one_shot: true
  timeout_seconds: 30
  docker_one_shot: >-
    ws="$(dirname {source})" && rm -rf "$ws/app" && cp -a /runner/template/. "$ws/app/" &&
    cp {source} "$ws/app/Program.cs" && cd "$ws/app" &&
    DOTNET_NOLOGO=1 dotnet build --no-restore -v q >/dev/null 2>&1 &&
    DOTNET_NOLOGO=1 dotnet run --no-build -v q --no-launch-profile
